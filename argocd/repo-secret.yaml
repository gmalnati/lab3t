# Argo CD repository credentials for your PRIVATE config repo.
#
# Argo CD runs INSIDE your cluster and pulls the config repo over HTTPS, so it
# needs a credential. Apply this to the `argocd` namespace BEFORE the
# Application, so the very first sync can authenticate.
#
# Fill in:
#   - url:      your workshop-git-ops-configuration repo (HTTPS .git URL)
#   - username: your GitHub username (any non-empty value works with a PAT)
#   - password: a GitHub PAT with READ access to the config repo
#
# Do NOT commit this file with a real PAT in it. It stays in your local clone
# of the skeleton and is applied with kubectl. Everything else (the `deploy/`
# folder and the `argocd/app-*.yaml` manifests) is pushed to the config repo.
apiVersion: v1
kind: Secret
metadata:
  name: repo-workshop-gitops-config
  namespace: argocd
  labels:
    # This label is what makes Argo CD treat the Secret as repo credentials.
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/<you>/workshop-git-ops-configuration.git
  username: <your-github-username>
  password: <your-PAT-with-read-access>
