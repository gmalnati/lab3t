# Prod overlay. Promote the SAME image tag that staging tested, never a
# rebuild. Sync requires manual approval (see argocd/app-prod.yaml: no
# automated syncPolicy).
env: prod
replicaCount: 3

image:
  tag: "REPLACE_ME"

ingress:
  enabled: true
  # Replace 0X with your participant number.
  host: ec-0X-pricingservice.ff26.it

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
